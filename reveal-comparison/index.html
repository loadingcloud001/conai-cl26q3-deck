<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Capabilities — Reveal.js comparison</title>
  <link rel="stylesheet" href="./node_modules/reveal.js/dist/reveal.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="reveal">
    <div class="slides">
      <section class="capability-slide" data-map-variant="filled">
        <div class="deck-ref">CL26Q3-MAP-REVEAL · r1</div>
        <div class="variant-label">Reveal.js · closest match</div>
        <h1>AI capabilities — 30+ Hugging Face tasks</h1>
        <div class="map-frame">
          <svg class="capability-map" role="img" aria-label="Mind map of 30 Hugging Face tasks grouped into six AI capability families"></svg>
        </div>
      </section>

      <section class="capability-slide" data-map-variant="outlined">
        <div class="deck-ref">CL26Q3-MAP-REVEAL · r2</div>
        <div class="variant-label">Reveal.js · border control</div>
        <h1>AI capabilities — 30+ Hugging Face tasks</h1>
        <div class="map-frame">
          <svg class="capability-map" role="img" aria-label="Mind map with controlled task borders and Object Detection highlighted"></svg>
        </div>
      </section>
    </div>
  </div>

  <script type="module" src="./mindmap.js"></script>
</body>
</html>
